<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
body{background:#0d1117;color:#e6edf3;font-family:monospace;padding:20px;}
button{background:#58a6ff;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:1rem;margin:4px;}
.result{margin-top:16px;background:#161b22;padding:14px;border-radius:8px;font-size:0.85rem;line-height:1.8;white-space:pre-wrap;word-break:break-all;}
.ok{color:#3fb950;} .err{color:#f85149;} .warn{color:#d29922;}
</style></head>
<body>
<h3 style="color:#58a6ff">GitHub Pages 連線診斷</h3>
<button onclick="testAll()">▶ 全部測試</button>
<div class="result" id="out">點按鈕開始…</div>
<script>
const FK='d8imcrhr01qmfrvhpv3gd8imcrhr01qmfrvhpv40';
const el=document.getElementById('out');
function log(msg,cls){el.innerHTML+=`<span class="${cls||''}">${msg}</span>\n`;}

async function testAll(){
  el.innerHTML='';

  // 1. Finnhub direct
  log('① Finnhub 直接請求…');
  try{
    const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=NVDA&token=${FK}`);
    const j=await r.json();
    log('  HTTP '+r.status+' · price=$'+j.c, j.c?'ok':'warn');
  }catch(e){log('  錯誤: '+e.message,'err');}

  // 2. Finnhub via allorigins
  log('② Finnhub via allorigins…');
  try{
    const url=encodeURIComponent(`https://finnhub.io/api/v1/quote?symbol=NVDA&token=${FK}`);
    const r=await fetch(`https://api.allorigins.win/get?url=${url}`);
    const j=await r.json();
    const d=JSON.parse(j.contents);
    log('  HTTP '+r.status+' · price=$'+d.c, d.c?'ok':'warn');
  }catch(e){log('  錯誤: '+e.message,'err');}

  // 3. Finnhub via corsproxy.io
  log('③ Finnhub via corsproxy.io…');
  try{
    const url=`https://corsproxy.io/?url=${encodeURIComponent(`https://finnhub.io/api/v1/quote?symbol=NVDA&token=${FK}`)}`;
    const r=await fetch(url);
    const j=await r.json();
    log('  HTTP '+r.status+' · price=$'+j.c, j.c?'ok':'warn');
  }catch(e){log('  錯誤: '+e.message,'err');}

  // 4. Yahoo Finance via allorigins
  log('④ Yahoo Finance via allorigins…');
  try{
    const url=encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/NVDA?interval=1d&range=5d');
    const r=await fetch(`https://api.allorigins.win/get?url=${url}`);
    const j=await r.json();
    const d=JSON.parse(j.contents);
    const price=d?.chart?.result?.[0]?.meta?.regularMarketPrice;
    log('  HTTP '+r.status+' · price=$'+price, price?'ok':'warn');
  }catch(e){log('  錯誤: '+e.message,'err');}

  // 5. Yahoo Finance via corsproxy.io
  log('⑤ Yahoo Finance via corsproxy.io…');
  try{
    const url=`https://corsproxy.io/?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/NVDA?interval=1d&range=5d')}`;
    const r=await fetch(url);
    const j=await r.json();
    const price=j?.chart?.result?.[0]?.meta?.regularMarketPrice;
    log('  HTTP '+r.status+' · price=$'+price, price?'ok':'warn');
  }catch(e){log('  錯誤: '+e.message,'err');}

  log('\n=== 完成 ===','warn');
}
</script>
</body></html>
