<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="投資助手">
<title>投資助手</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',sans-serif;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;gap:24px;}
.logo{font-size:2.6rem;}
.title{font-size:1.4rem;font-weight:800;}
.sub{font-size:0.82rem;color:var(--muted);text-align:center;line-height:1.6;}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:420px;}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px 14px;text-align:center;cursor:pointer;text-decoration:none;color:inherit;display:block;transition:transform 0.12s;}
.mode-card:active{transform:scale(0.97);}
.mode-icon{font-size:2.2rem;margin-bottom:10px;}
.mode-name{font-size:0.95rem;font-weight:700;margin-bottom:6px;}
.mode-desc{font-size:0.7rem;color:var(--muted);line-height:1.6;}
.stocks-card{border-color:var(--blue);box-shadow:0 0 20px rgba(88,166,255,0.1);}
.stocks-card .mode-name{color:var(--blue);}
.options-card{border-color:var(--red);box-shadow:0 0 20px rgba(248,81,73,0.1);}
.options-card .mode-name{color:var(--red);}
.ver{font-size:0.62rem;color:#4d5562;}
</style>
</head>
<body>
  <div class="logo">📈</div>
  <div class="title">投資助手</div>
  <div class="sub">請選擇操作模式</div>

  <div class="mode-row">
    <a class="mode-card stocks-card" href="stocks.html">
      <div class="mode-icon">💼</div>
      <div class="mode-name">股票組合</div>
      <div class="mode-desc">再平衡計算器<br>MA5/10/20 走勢<br>止盈加倉建議</div>
    </a>
    <a class="mode-card options-card" href="options.html">
      <div class="mode-icon">📊</div>
      <div class="mode-name">期權策略</div>
      <div class="mode-desc">VXN/VIX 即時<br>行使價建議<br>動態注碼管理</div>
    </a>
  </div>

  <div class="ver">v8.0 · matthewleung09</div>
</body>
</html>
