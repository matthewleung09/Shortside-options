<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="期權建議">
<title>期權賣出建議</title>
<style>
  :root {
    --bg:#0d1117; --card:#161b22; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --blue:#58a6ff;
    --green:#3fb950; --yellow:#d29922; --red:#f85149; --orange:#f0883e;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',sans-serif;overscroll-behavior:none;}
  body{padding:env(safe-area-inset-top,16px) 0 env(safe-area-inset-bottom,16px);display:flex;flex-direction:column;}

  /* Header */
  .header{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-size:1.05rem;font-weight:700;color:var(--text);}
  .header-title span{color:var(--blue);}
  .update-btn{background:var(--card);border:1px solid var(--border);color:var(--blue);padding:7px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;}
  .update-btn:active{opacity:0.7;transform:scale(0.96);}

  /* Status */
  .status-bar{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 8px;}
  .market-badge{font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;}
  .open{background:#1a4a25;color:var(--green);}
  .closed{background:#2a1a1a;color:var(--red);}
  .pre{background:#2a2a10;color:var(--yellow);}
  .update-time{font-size:0.66rem;color:var(--muted);}

  /* ETF Tab bar */
  .etf-tabs-wrap{padding:0 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .etf-tabs-wrap::-webkit-scrollbar{display:none;}
  .etf-tabs{display:flex;gap:8px;width:max-content;}
  .etf-tab{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:22px;font-size:0.8rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.18s;}
  .etf-tab:active{transform:scale(0.95);}
  .etf-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .etf-tab .etf-name{font-size:0.65rem;display:block;font-weight:400;margin-top:1px;opacity:0.8;}

  /* Scroll body */
  .scroll-body{flex:1;overflow-y:auto;padding:0 14px 20px;-webkit-overflow-scrolling:touch;}

  /* Metrics */
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .metric{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;}
  .metric-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
  .metric-value{font-size:1.9rem;font-weight:800;line-height:1;}
  .metric-change{font-size:0.7rem;color:var(--muted);margin-top:4px;}

  /* Scenario banner */
  .scenario-full{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .scenario-name{font-size:0.95rem;font-weight:700;}
  .scenario-vix{font-size:0.73rem;color:var(--muted);margin-top:3px;}
  .scenario-icon{font-size:1.7rem;}

  /* Section label */
  .section-label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;padding-left:2px;}

  /* Strike cards */
  .strike-card{border-radius:14px;padding:15px;margin-bottom:10px;border:1px solid transparent;}
  .strike-card.primary{background:#1a0a09;border-color:var(--red);}
  .strike-card.secondary{background:#150d05;border-color:var(--orange);}
  .strike-tag{font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:9px;}
  .tag-standard{background:#3a1010;color:var(--red);}
  .tag-conservative{background:#2a1800;color:var(--orange);}
  .strike-prices{font-size:1.8rem;font-weight:800;color:#f0f6fc;margin-bottom:5px;}
  .strike-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .strike-pct{font-size:0.78rem;color:var(--muted);}
  .strike-delta{font-size:0.78rem;font-weight:700;}
  .delta-warn{color:var(--red);} .delta-ok{color:var(--green);}
  .strike-note{font-size:0.73rem;color:#8b949e;margin-top:7px;line-height:1.5;}

  /* Lots */
  .lots-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:10px;}
  .lots-header{font-size:0.72rem;color:var(--muted);margin-bottom:9px;}
  .lots-row{display:flex;gap:8px;}
  .lot-btn{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
  .lot-btn.rec{border-color:var(--red);background:#2a0a08;}
  .lot-num{font-size:1.25rem;font-weight:800;}
  .lot-btn.rec .lot-num{color:var(--red);}
  .lot-lbl{font-size:0.6rem;color:var(--muted);margin-top:3px;}
  .lot-btn.rec .lot-lbl{color:var(--red);}

  /* Ref table */
  .ref-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;}
  .ref-header-row{display:flex;padding:8px 13px;background:#21262d;gap:8px;}
  .ref-hcell{font-size:0.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;}
  .ref-row{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border);gap:8px;}
  .ref-row:last-child{border-bottom:none;}
  .ref-row.active-row{background:#1a1a2e;}
  .ref-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .ref-range{font-size:0.75rem;flex:1.2;}
  .ref-dist{font-size:0.73rem;color:var(--muted);flex:1;text-align:center;}
  .ref-lots{font-size:0.73rem;color:var(--muted);flex:0.9;text-align:right;}
  .ref-active-mark{font-size:0.6rem;color:var(--blue);font-weight:700;}

  /* Loading */
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(13,17,23,0.88);align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:100;}
  .loading-overlay.show{display:flex;}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:0.88rem;color:var(--muted);}

  .c-green{color:var(--green);} .c-yellow{color:var(--yellow);}
  .c-red{color:var(--red);} .c-blue{color:var(--blue);}
  .disclaimer{font-size:0.6rem;color:#4d5562;text-align:center;line-height:1.6;padding:0 10px 6px;}
</style>
</head>
<body>

<div class="loading-overlay" id="overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-msg">正在抓取最新報價…</div>
</div>

<div class="header">
  <div class="header-title">📊 <span id="header-ticker">QQQ</span> 期權建議</div>
  <button class="update-btn" onclick="loadData()">🔄 更新</button>
</div>

<div class="status-bar">
  <span id="market-badge" class="market-badge closed">⏸ 休市</span>
  <span id="update-time" class="update-time">尚未載入</span>
</div>

<!-- ETF Tab Bar -->
<div class="etf-tabs-wrap">
  <div class="etf-tabs" id="etf-tabs"></div>
</div>

<div class="scroll-body">
  <div class="metrics">
    <div class="metric">
      <div class="metric-label">VIX 恐慌指數</div>
      <div class="metric-value" id="vix-val">--</div>
      <div class="metric-change" id="vix-chg">--</div>
    </div>
    <div class="metric">
      <div class="metric-label" id="price-label">ETF 現價</div>
      <div class="metric-value c-blue" id="etf-val">--</div>
      <div class="metric-change" id="etf-chg">--</div>
    </div>
  </div>

  <div class="scenario-full" id="scenario-banner">
    <div>
      <div class="scenario-name" id="sc-name">計算中…</div>
      <div class="scenario-vix" id="sc-sub">--</div>
    </div>
    <div class="scenario-icon" id="sc-icon">⏳</div>
  </div>

  <div id="dynamic-content"></div>

  <div class="disclaimer">⚠️ 本工具僅供參考，不構成投資建議。期權交易涉及重大風險，請自行評估。</div>
</div>

<script>
const ETFS = [
  { ticker:'QQQ',  name:'納指100',   desc:'Invesco QQQ Trust' },
  { ticker:'SPY',  name:'S&P500',    desc:'SPDR S&P 500 ETF' },
  { ticker:'VOO',  name:'Vanguard',  desc:'Vanguard S&P 500' },
  { ticker:'IWM',  name:'小型股',    desc:'iShares Russell 2000' },
  { ticker:'DIA',  name:'道瓊斯',    desc:'SPDR Dow Jones' },
  { ticker:'XLK',  name:'科技',      desc:'Technology Select SPDR' },
  { ticker:'ARKK', name:'ARK',       desc:'ARK Innovation ETF' },
  { ticker:'GLD',  name:'黃金',      desc:'SPDR Gold Shares' },
];

let currentTicker = 'QQQ';
let vix = null, etfPrice = null;
let cache = {}; // {ticker: {price, change, ts}}

// Build tabs
const tabsEl = document.getElementById('etf-tabs');
ETFS.forEach(e => {
  const btn = document.createElement('button');
  btn.className = 'etf-tab' + (e.ticker === 'QQQ' ? ' active' : '');
  btn.innerHTML = `${e.ticker}<span class="etf-name">${e.name}</span>`;
  btn.onclick = () => switchETF(e.ticker);
  btn.id = 'tab-' + e.ticker;
  tabsEl.appendChild(btn);
});

function switchETF(ticker) {
  currentTicker = ticker;
  document.querySelectorAll('.etf-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + ticker).classList.add('active');
  document.getElementById('header-ticker').textContent = ticker;
  const etf = ETFS.find(e => e.ticker === ticker);
  document.getElementById('price-label').textContent = ticker + ' 現價';
  // Use cache if fresh (< 5 min)
  const c = cache[ticker];
  if (c && Date.now() - c.ts < 300000) {
    etfPrice = c.price;
    document.getElementById('etf-val').textContent = '$' + c.price.toFixed(2);
    document.getElementById('etf-chg').textContent = (c.change >= 0 ? '+' : '') + c.change.toFixed(2) + ' 今日';
    if (vix) renderContent(vix, c.price);
  } else {
    loadData();
  }
}

function marketStatus() {
  const et = new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  const d = et.getDay(), m = et.getHours()*60+et.getMinutes();
  if(d===0||d===6) return 'closed';
  if(m>=570&&m<960) return 'open';
  if(m>=240&&m<570) return 'pre';
  if(m>=960&&m<1200) return 'after';
  return 'closed';
}

function getScene(v) {
  if(v<13) return {name:'🟢 低波動市場',sub:'VIX < 13　輕鬆收租模式',color:'#3fb950',id:'low'};
  if(v<=18) return {name:'🟡 正常波動',sub:'VIX 14–18　標準操作',color:'#d29922',id:'mid'};
  if(v<=25) return {name:'🔴 高波動警戒',sub:'VIX 20–25　擴大安全距離',color:'#f85149',id:'high'};
  return {name:'💀 極端波動',sub:'VIX > 25　極度謹慎或暫停',color:'#ff7b72',id:'extreme'};
}

function getStrikes(v,q) {
  if(v<13) return [{tag:'標準賣出',tagClass:'tag-standard',cardClass:'primary',low:+(q*0.98).toFixed(2),high:+(q*0.985).toFixed(2),pct:'1.5–2.0%',delta:'~0.12',deltaClass:'delta-ok',note:'VIX 極低，市場平靜，可選較近行使價收更多期權金。'}];
  if(v<=18) return [{tag:'標準賣出',tagClass:'tag-standard',cardClass:'primary',low:+(q*0.97).toFixed(2),high:+(q*0.975).toFixed(2),pct:'2.5–3.0%',delta:'~0.12',deltaClass:'delta-ok',note:'正常環境，平衡期權金與安全邊際，是最常用情景。'}];
  if(v<=25) return [
    {tag:'安全遠（標準）',tagClass:'tag-standard',cardClass:'primary',low:+(q*0.955).toFixed(2),high:+(q*0.965).toFixed(2),pct:'3.5–4.5%',delta:'~0.12',deltaClass:'delta-warn',note:'波動偏高，須拉遠距離。注碼用標準梯，別貪張數。'},
    {tag:'極遠（保守）',tagClass:'tag-conservative',cardClass:'secondary',low:+(q*0.935).toFixed(2),high:+(q*0.945).toFixed(2),pct:'5.5–6.5%',delta:'< 0.06',deltaClass:'delta-ok',note:'最保守選擇，Delta 極低，適合大注碼或市況不明時。'}
  ];
  return [{tag:'⚠️ 極端情景',tagClass:'tag-conservative',cardClass:'secondary',low:+(q*0.935).toFixed(2),high:+(q*0.945).toFixed(2),pct:'5.5–6.5%+',delta:'~0.08',deltaClass:'delta-ok',note:'VIX > 25，市場極度恐慌。強烈建議大幅減注或暫停本週操作。'}];
}

function getLots(v) {
  if(v<13) return [{n:6,l:'保守'},{n:10,l:'標準 ✓',rec:true},{n:14,l:'積極'}];
  if(v<=18) return [{n:5,l:'保守'},{n:8,l:'標準 ✓',rec:true},{n:10,l:'積極'}];
  if(v<=25) return [{n:3,l:'保守'},{n:5,l:'標準 ✓',rec:true},{n:7,l:'積極'}];
  return [{n:1,l:'保守'},{n:2,l:'標準 ✓',rec:true},{n:3,l:'積極'}];
}

function renderContent(v,q) {
  const sc = getScene(v);
  const strikes = getStrikes(v,q);
  const lots = getLots(v);

  document.getElementById('sc-name').textContent = sc.name;
  document.getElementById('sc-name').style.color = sc.color;
  document.getElementById('sc-sub').textContent = sc.sub;
  document.getElementById('sc-icon').textContent = sc.id==='low'?'😊':sc.id==='mid'?'😐':sc.id==='high'?'😰':'🚨';
  document.getElementById('scenario-banner').style.borderColor = sc.color;

  let html = `<div class="section-label">📐 建議行使價（${currentTicker}）</div>`;
  strikes.forEach(s => {
    html += `<div class="strike-card ${s.cardClass}">
      <span class="strike-tag ${s.tagClass}">${s.tag}</span>
      <div class="strike-prices">$${s.low} – $${s.high}</div>
      <div class="strike-meta">
        <span class="strike-pct">距現價 ${s.pct}（${currentTicker} $${q.toFixed(2)}）</span>
        <span class="strike-delta ${s.deltaClass}">△ ${s.delta}</span>
      </div>
      <div class="strike-note">${s.note}<br>📅 建議選下週五到期（7–10 DTE），避開財報 / FOMC 週。</div>
    </div>`;
  });

  html += `<div class="section-label" style="margin-top:4px">📦 今日建議注碼</div>
  <div class="lots-card">
    <div class="lots-header">動態階梯 — VIX ${v.toFixed(2)}　（VIX↑ 減注，財報/FOMC 週自動降一格）</div>
    <div class="lots-row">`;
  lots.forEach(l => {
    html += `<div class="lot-btn ${l.rec?'rec':''}">
      <div class="lot-num">${l.n}</div>
      <div class="lot-lbl">${l.l}</div>
    </div>`;
  });
  html += `</div></div>`;

  const rows = [
    {range:'VIX < 13',dist:'1.5–2%',lots:'8–12張',color:'#3fb950'},
    {range:'VIX 14–18',dist:'2.5–3%',lots:'6–10張',color:'#d29922'},
    {range:'VIX 20–25 標準',dist:'3.5–4.5%',lots:'4–7張',color:'#f85149'},
    {range:'VIX 20–25 保守',dist:'5.5–6.5%',lots:'3–5張',color:'#f0883e'},
    {range:'VIX > 25',dist:'5.5%+',lots:'1–3張',color:'#ff7b72'},
  ];
  html += `<div class="section-label" style="margin-top:4px">📋 全情景參考</div>
  <div class="ref-card">
  <div class="ref-header-row">
    <div class="ref-hcell" style="flex:0.15"></div>
    <div class="ref-hcell" style="flex:1.2">情景</div>
    <div class="ref-hcell" style="flex:1;text-align:center">距現價</div>
    <div class="ref-hcell" style="flex:0.9;text-align:right">注碼</div>
  </div>`;
  rows.forEach((r,i) => {
    const active=(v<13&&i===0)||(v>=14&&v<=18&&i===1)||(v>20&&v<=25&&(i===2||i===3))||(v>25&&i===4);
    html += `<div class="ref-row ${active?'active-row':''}">
      <div class="ref-dot" style="background:${r.color}"></div>
      <div class="ref-range" style="color:${active?r.color:'var(--text)'};font-weight:${active?700:400}">${r.range}</div>
      <div class="ref-dist">${r.dist}</div>
      <div class="ref-lots">${r.lots} ${active?'<span class="ref-active-mark">◀</span>':''}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('dynamic-content').innerHTML = html;
}

async function loadData() {
  document.getElementById('overlay').classList.add('show');
  const status = marketStatus();
  const badge = document.getElementById('market-badge');
  if(status==='open'){badge.textContent='🟢 美股開市';badge.className='market-badge open';}
  else if(status==='pre'){badge.textContent='🌅 盤前交易';badge.className='market-badge pre';}
  else if(status==='after'){badge.textContent='🌙 盤後交易';badge.className='market-badge pre';}
  else{badge.textContent='⏸ 美股休市';badge.className='market-badge closed';}

  document.getElementById('loading-msg').textContent = `正在抓取 VIX & ${currentTicker}…`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:400,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:`Search for the latest VIX index value and ${currentTicker} ETF stock price right now today. Return ONLY valid JSON, no markdown: {"vix":<number>,"etf":<number>,"vix_change":<number>,"etf_change":<number>}`}]
      })
    });
    const data = await res.json();
    const txt = data.content.map(b=>b.type==='text'?b.text:'').join('');
    const m = txt.replace(/```json|```/g,'').match(/\{[\s\S]*?\}/);
    if(!m) throw new Error('parse');
    const d = JSON.parse(m[0]);
    vix = d.vix; etfPrice = d.etf;
    cache[currentTicker] = {price:d.etf, change:d.etf_change||0, ts:Date.now()};

    const vixEl = document.getElementById('vix-val');
    vixEl.textContent = vix.toFixed(2);
    vixEl.className = 'metric-value '+(vix<13?'c-green':vix<=18?'c-yellow':'c-red');
    const vc = d.vix_change||0;
    document.getElementById('vix-chg').textContent=(vc>=0?'+':'')+vc.toFixed(2)+' 今日';
    document.getElementById('etf-val').textContent='$'+etfPrice.toFixed(2);
    const qc = d.etf_change||0;
    document.getElementById('etf-chg').textContent=(qc>=0?'+':'')+qc.toFixed(2)+' 今日';
    document.getElementById('update-time').textContent='更新：'+new Date().toLocaleTimeString('zh-Hant',{hour:'2-digit',minute:'2-digit'});
    renderContent(vix, etfPrice);
  } catch(e) {
    // Fallback
    const fallbacks = {QQQ:700.29,SPY:585.5,VOO:537.2,IWM:210.5,DIA:425.3,XLK:230.1,ARKK:62.4,GLD:310.5};
    vix=21.51; etfPrice=fallbacks[currentTicker]||500;
    document.getElementById('vix-val').textContent=vix.toFixed(2);
    document.getElementById('vix-val').className='metric-value c-red';
    document.getElementById('vix-chg').textContent='備用數據';
    document.getElementById('etf-val').textContent='$'+etfPrice.toFixed(2);
    document.getElementById('etf-chg').textContent='備用數據';
    document.getElementById('update-time').textContent='⚠️ 備用數據';
    renderContent(vix, etfPrice);
  }
  document.getElementById('overlay').classList.remove('show');
}

loadData();
setInterval(loadData,300000);
</script>
</body>
</html>
