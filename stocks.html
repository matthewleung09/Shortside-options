<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="股票組合">
<title>股票組合</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--orange:#f0883e;--purple:#bc8cff;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',sans-serif;overscroll-behavior:none;}
body{display:flex;flex-direction:column;padding:env(safe-area-inset-top,16px) 0 env(safe-area-inset-bottom,16px);}

/* HEADER */
.hdr{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-left{display:flex;align-items:center;gap:8px;}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;}
.back-btn:active{opacity:0.7;}
.hdr-title{font-size:1.05rem;font-weight:700;}
.hdr-title span{color:var(--blue);}
.icon-btn{background:var(--card);border:1px solid var(--border);color:var(--blue);padding:7px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.icon-btn:active{opacity:0.7;}

/* PAGES */
.page{display:none;flex:1;flex-direction:column;overflow:hidden;}
.page.active{display:flex;}
.scroll-body{flex:1;overflow-y:auto;padding:0 14px 20px;-webkit-overflow-scrolling:touch;}

/* CASH BAR */
.cash-bar{background:var(--card);border:1px solid var(--blue);border-radius:14px;padding:12px 14px;margin-bottom:12px;}
.cash-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cash-label{font-size:0.72rem;color:var(--blue);font-weight:700;}
.cash-sub{font-size:0.65rem;color:var(--muted);}
.cash-input-row{display:flex;gap:8px;align-items:center;}
.cash-prefix{font-size:1rem;font-weight:700;color:var(--muted);}
.cash-input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:1.25rem;font-weight:800;padding:8px 12px;border-radius:10px;flex:1;outline:none;-webkit-appearance:none;}
.cash-input:focus{border-color:var(--blue);}
.cash-confirm{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:10px;font-size:0.85rem;font-weight:700;cursor:pointer;}
.cash-total-row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;font-size:0.7rem;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.cash-total-row span{color:var(--text);font-weight:600;}

/* SUMMARY */
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.sum-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;}
.sum-lbl{font-size:0.62rem;color:var(--muted);margin-bottom:4px;}
.sum-val{font-size:0.95rem;font-weight:800;}

/* POSITION CARD */
.pos-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.pos-header{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;}
.pos-left .pos-ticker{font-size:1.05rem;font-weight:800;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pos-left .pos-name{font-size:0.65rem;color:var(--muted);margin-top:2px;}
.pos-left .pos-wt{font-size:0.65rem;color:var(--muted);margin-top:2px;}
.pos-right{text-align:right;}
.pos-price{font-size:1.05rem;font-weight:700;}
.pos-price-sub{font-size:0.65rem;color:var(--muted);margin-top:2px;}
.pos-action{padding:0 14px 10px;cursor:pointer;}
.act-badge{font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:10px;display:inline-block;}
.act-buy{background:#1a4a25;color:var(--green);}
.act-sell{background:#2a1010;color:var(--red);}
.act-hold{background:#21262d;color:var(--muted);}
.act-cash{background:#1a2a3a;color:var(--blue);}

/* MA STRIP */
.ma-strip{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border);background:#0d1117;}
.ma-chip{flex:1;text-align:center;background:var(--card);border-radius:8px;padding:5px 4px;}
.ma-chip-lbl{font-size:0.58rem;font-weight:700;}
.ma-chip-val{font-size:0.78rem;font-weight:800;margin-top:2px;}
.ma-chip-d{font-size:0.58rem;margin-top:2px;}
.ma5c{color:var(--blue);}.ma10c{color:var(--yellow);}.ma20c{color:var(--purple);}

/* REBAL ROW */
.rebal-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px 14px;border-top:1px solid var(--border);background:#0a0f15;}
.rb-cell{text-align:center;}
.rb-lbl{font-size:0.6rem;color:var(--muted);margin-bottom:3px;}
.rb-val{font-size:0.88rem;font-weight:700;}
.rb-sub{font-size:0.6rem;color:var(--muted);margin-top:2px;}

/* SIG PILL */
.sig-pill{font-size:0.63rem;font-weight:700;padding:2px 8px;border-radius:10px;}
.pill-bull{background:#1a3a20;color:var(--green);}
.pill-bear{background:#3a1010;color:var(--red);}
.pill-warn{background:#3a2a00;color:var(--yellow);}
.pill-idle{background:#21262d;color:var(--muted);}

/* DETAIL */
.sig-banner{border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1px solid;}
.sig-title{font-size:1rem;font-weight:800;margin-bottom:5px;}
.sig-body{font-size:0.77rem;line-height:1.65;white-space:pre-line;}
.sig-action{font-size:0.74rem;font-weight:700;margin-top:9px;padding:6px 12px;border-radius:8px;display:inline-block;}
.ma-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.ma-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;}
.ma-box-lbl{font-size:0.62rem;font-weight:700;margin-bottom:4px;}
.ma-box-val{font-size:0.95rem;font-weight:800;}
.ma-box-diff{font-size:0.62rem;margin-top:3px;}
.arrange-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:10px;}
.arrange-lbl{font-size:0.68rem;color:var(--muted);margin-bottom:7px;}
.ai-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ai{padding:4px 10px;border-radius:8px;font-size:0.75rem;font-weight:700;}
.ai-price{background:#1a2a3a;color:var(--blue);}
.ai-ma5{background:#0f1e3a;color:var(--blue);}
.ai-ma10{background:#2a2000;color:var(--yellow);}
.ai-ma20{background:#1e1030;color:var(--purple);}
.ai-sep{color:var(--muted);font-size:0.7rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.met{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 12px;}
.met-lbl{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.met-val{font-size:1.05rem;font-weight:800;}
.met-sub{font-size:0.63rem;color:var(--muted);margin-top:3px;}
.tpsl-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.tpsl-lbl{font-size:0.68rem;color:var(--muted);margin-bottom:9px;}
.prog-track{height:6px;background:#21262d;border-radius:3px;overflow:hidden;margin:4px 0 3px;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.4s;}
.prog-labels{display:flex;justify-content:space-between;font-size:0.6rem;color:var(--muted);margin-bottom:8px;}
.tpsl-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.tpsl-r:last-child{margin-bottom:0;}
.tpsl-k{font-size:0.75rem;}
.tpsl-v{font-size:0.88rem;font-weight:700;}
.tpsl-pct{font-size:0.65rem;color:var(--muted);margin-left:4px;}
.note-box{background:var(--card);border:1px solid var(--yellow);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.note-lbl{font-size:0.68rem;color:var(--muted);margin-bottom:6px;}
.note-txt{font-size:0.77rem;color:#c9d1d9;line-height:1.65;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom)+20px);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:14px;}
.field{margin-bottom:10px;}
.field label{font-size:0.72rem;color:var(--muted);display:block;margin-bottom:4px;}
.field input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:0.95rem;padding:9px 12px;border-radius:10px;width:100%;outline:none;}
.field input:focus{border-color:var(--blue);}
.hint{font-size:0.62rem;color:var(--muted);margin-top:3px;}
.modal-btns{display:flex;gap:8px;margin-top:14px;}
.mbtn-del{flex:1;background:#2a1010;border:1px solid var(--red);color:var(--red);padding:11px;border-radius:12px;font-size:0.85rem;cursor:pointer;}
.mbtn-cancel{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:11px;border-radius:12px;font-size:0.85rem;cursor:pointer;}
.mbtn-save{flex:2;background:var(--blue);border:none;color:#fff;padding:11px;border-radius:12px;font-size:0.85rem;font-weight:700;cursor:pointer;}
.fab{position:fixed;bottom:28px;right:18px;background:var(--blue);color:#fff;border:none;width:52px;height:52px;border-radius:50%;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(88,166,255,0.35);display:flex;align-items:center;justify-content:center;z-index:50;}
.fab:active{transform:scale(0.95);}

/* LOADING */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(13,17,23,0.92);align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:300;}
.loading-overlay.show{display:flex;}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:0.88rem;color:var(--muted);}
.loading-sub{font-size:0.72rem;color:#4d5562;margin-top:4px;}

.disclaimer{font-size:0.6rem;color:#4d5562;text-align:center;line-height:1.6;padding:4px 10px 8px;}
.c-green{color:var(--green);}.c-red{color:var(--red);}.c-yellow{color:var(--yellow);}.c-blue{color:var(--blue);}.c-muted{color:var(--muted);}
</style>
</head>
<body>

<div class="loading-overlay" id="overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="lmsg">載入中…</div>
  <div class="loading-sub" id="lsub"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">編輯持倉</div>
    <div class="field"><label>股票代號</label><input id="f-ticker" placeholder="例：NVDA"></div>
    <div class="field"><label>股票名稱</label><input id="f-name" placeholder="例：英偉達"></div>
    <div class="field"><label>持倉股數（空倉填 0）</label><input id="f-shares" type="number" step="1" placeholder="例：13"></div>
    <div class="field"><label>平均成本價 ($)</label><input id="f-cost" type="number" step="0.001" placeholder="例：219.041"></div>
    <div class="field"><label>目標倉位權重 (%)</label><input id="f-weight" type="number" step="1" placeholder="例：12"><div class="hint">整體組合中此股的目標比重</div></div>
    <div class="field"><label>止盈 TARGET (% 相對成本)</label><input id="f-tp" type="number" step="1" placeholder="例：30 → 成本+30%"><div class="hint">留空 = 長線不賣</div></div>
    <div class="field"><label>加倉 BUY DIP (% 跌幅)</label><input id="f-dip" type="number" step="1" placeholder="例：20 → 跌-20%才加倉"><div class="hint">留空 = 不設加倉</div></div>
    <div class="field"><label>止蝕 (% 跌幅)</label><input id="f-sl" type="number" step="1" placeholder="例：35 → 跌-35%止蝕"><div class="hint">留空 = 裝死不割</div></div>
    <div class="field"><label>戰略備忘</label><input id="f-note" placeholder="例：跌穿$189才加倉，不割肉"></div>
    <div class="modal-btns">
      <button class="mbtn-del" id="mbtn-del" onclick="deletePosModal()">🗑</button>
      <button class="mbtn-cancel" onclick="closeModal()">取消</button>
      <button class="mbtn-save" onclick="savePosModal()">💾 儲存</button>
    </div>
  </div>
</div>

<!-- LIST PAGE -->
<div class="hdr" id="list-hdr">
  <div class="hdr-left">
    <a class="back-btn" href="index.html">←</a>
    <div class="hdr-title">💼 <span>股票組合</span></div>
  </div>
  <button class="icon-btn" onclick="loadAllData()">🔄 更新</button>
</div>

<div class="page active" id="list-page">
  <div class="scroll-body">
    <div class="cash-bar">
      <div class="cash-top">
        <div class="cash-label">💵 總現金戶口存款</div>
        <div class="cash-sub" id="cash-updated">--</div>
      </div>
      <div class="cash-input-row">
        <span class="cash-prefix">$</span>
        <input class="cash-input" id="cash-input" type="number" step="100" placeholder="0" inputmode="decimal">
        <button class="cash-confirm" onclick="saveCash()">確認</button>
      </div>
      <div class="cash-total-row">
        <span>持股市值</span><span id="mv-total">--</span>
        <span>總資產</span><span id="asset-total">--</span>
        <span>現金</span><span id="cash-display">--</span>
      </div>
    </div>
    <div class="summary-row">
      <div class="sum-box"><div class="sum-lbl">總市值</div><div class="sum-val" id="s-mv">--</div></div>
      <div class="sum-box"><div class="sum-lbl">總損益</div><div class="sum-val" id="s-pnl">--</div></div>
      <div class="sum-box"><div class="sum-lbl">更新時間</div><div class="sum-val" style="font-size:0.7rem;color:var(--muted)" id="s-src">--</div></div>
    </div>
    <div id="pos-list"></div>
    <div class="disclaimer">⚠️ 數據為前收盤價（Alpha Vantage）。再平衡建議僅供參考。</div>
  </div>
</div>

<!-- DETAIL PAGE -->
<div class="hdr" id="detail-hdr" style="display:none">
  <div class="hdr-left">
    <button class="back-btn" onclick="showList()">←</button>
    <div class="hdr-title" id="d-title">--</div>
  </div>
  <button class="icon-btn" onclick="openEditModal(currentDetailTicker)">✏️ 編輯</button>
</div>

<div class="page" id="detail-page">
  <div class="scroll-body" id="d-body"></div>
</div>

<button class="fab" id="fab" onclick="openAddModal()">＋</button>

<script>
const AV_KEY = '2NTBROZB1WU9FX29';
const SK = 'portfolio_v3';
const CASH_KEY = 'total_cash_v1';
let positions = [], cashTotal = 0, currentDetailTicker = null, editingTicker = null;

const DEFAULTS = [
  {ticker:'VOO', name:'標普500 ETF',  shares:10, cost:681.184, weight:30, tpPct:null, dipPct:15,  slPct:null, note:'長線壓艙石，永不割肉。跌-15%（~$579）才算極端特價區。'},
  {ticker:'NVDA',name:'英偉達',        shares:13, cost:219.041, weight:12, tpPct:30,   dipPct:20,  slPct:null, note:'不設割肉止蝕。跌-20%（~$175）才考慮補倉，目前屬裝死區。'},
  {ticker:'GLD', name:'黃金ETF',       shares:5,  cost:73.551,  weight:10, tpPct:null, dipPct:null,slPct:null, note:'不割肉也不補倉，長線數碼黃金配置。'},
  {ticker:'VRT', name:'維諦技術',      shares:8,  cost:336.994, weight:8,  tpPct:25,   dipPct:20,  slPct:null, note:'低位飽和打擊已完成。跌穿$290不再加倉，全面裝死等TARGET 25%。'},
  {ticker:'RKLB',name:'火箭實驗',      shares:8,  cost:112.470, weight:5,  tpPct:50,   dipPct:35,  slPct:null, note:'太空股性格暴烈。跌-35%（~$73）才是極限。4股已掛雲端限價單等TARGET 50%。'},
  {ticker:'TQQQ',name:'三倍納指槓桿', shares:0,  cost:0,       weight:5,  tpPct:20,   dipPct:30,  slPct:null, note:'目前空倉。從開槍起點跌-30%時，用3.5萬港元撿鑽石。'},
  {ticker:'HWM', name:'航天航材',      shares:4,  cost:271.850, weight:5,  tpPct:20,   dipPct:15,  slPct:null, note:'傳統製造業防禦軍。跌-15%（~$231）才開槍加倉。'},
];

// ── STORAGE ──
function persist(){try{localStorage.setItem(SK,JSON.stringify(positions));}catch(e){}}
function loadStorage(){
  try{const d=localStorage.getItem(SK);if(d)positions=JSON.parse(d);}catch(e){positions=[];}
  if(!positions.length){positions=DEFAULTS.map(p=>({...p,price:null,ma5:null,ma10:null,ma20:null,priceDate:null}));persist();}
  try{cashTotal=parseFloat(localStorage.getItem(CASH_KEY))||0;}catch(e){cashTotal=0;}
  if(cashTotal) document.getElementById('cash-input').value=cashTotal;
}

// ── PAGE NAV ──
function showList(){
  document.getElementById('list-hdr').style.display='';
  document.getElementById('detail-hdr').style.display='none';
  document.getElementById('list-page').classList.add('active');
  document.getElementById('detail-page').classList.remove('active');
  document.getElementById('fab').style.display='';
  renderList();
}
function showDetail(ticker){
  currentDetailTicker=ticker;
  document.getElementById('list-hdr').style.display='none';
  document.getElementById('detail-hdr').style.display='';
  document.getElementById('list-page').classList.remove('active');
  document.getElementById('detail-page').classList.add('active');
  document.getElementById('fab').style.display='none';
  const p=positions.find(x=>x.ticker===ticker);
  document.getElementById('d-title').innerHTML=`${p.ticker} <span style="color:var(--muted);font-size:0.78rem;font-weight:400">${p.name}</span>`;
  buildDetail(p);
}

// ── CASH ──
function saveCash(){
  cashTotal=parseFloat(document.getElementById('cash-input').value)||0;
  try{localStorage.setItem(CASH_KEY,cashTotal);}catch(e){}
  document.getElementById('cash-updated').textContent='已更新 '+new Date().toLocaleTimeString('zh-Hant',{hour:'2-digit',minute:'2-digit'});
  renderList();
}

// ── ALPHA VANTAGE ──
function avUrl(sym){
  const base=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${sym}&outputsize=compact&apikey=${AV_KEY}`;
  return`https://api.allorigins.win/get?url=${encodeURIComponent(base)}`;
}
async function fetchQuoteAndMA(ticker){
  const r=await fetch(avUrl(ticker));
  if(!r.ok) throw new Error('proxy '+r.status);
  const j=await r.json();
  const data=JSON.parse(j.contents);
  if(data['Note']||data['Information']) throw new Error('rate limit');
  const ts=data['Time Series (Daily)'];
  if(!ts) throw new Error('no data');
  const dates=Object.keys(ts).sort().reverse();
  const closes=dates.map(d=>parseFloat(ts[d]['4. close']));
  function maCalc(n){if(closes.length<n)return null;return+(closes.slice(0,n).reduce((a,b)=>a+b,0)/n).toFixed(2);}
  return{price:closes[0],change:+(closes[0]-closes[1]).toFixed(2),ma5:maCalc(5),ma10:maCalc(10),ma20:maCalc(20),priceDate:dates[0]};
}

async function loadAllData(){
  document.getElementById('lmsg').textContent='更新股票數據…';
  document.getElementById('lsub').textContent='Alpha Vantage 免費版每分鐘限 5 次，逐一更新';
  document.getElementById('overlay').classList.add('show');
  for(let i=0;i<positions.length;i++){
    const p=positions[i];
    document.getElementById('lmsg').textContent=`更新 ${p.ticker} (${i+1}/${positions.length})…`;
    try{
      const d=await fetchQuoteAndMA(p.ticker);
      Object.assign(p,d);
    }catch(e){/* keep existing */}
    persist();
    if(i<positions.length-1){
      for(let s=13;s>=1;s--){
        document.getElementById('lsub').textContent=`下一隻 ${positions[i+1].ticker} — ${s}秒後繼續…`;
        await new Promise(r=>setTimeout(r,1000));
      }
    }
  }
  document.getElementById('s-src').textContent=new Date().toLocaleTimeString('zh-Hant',{hour:'2-digit',minute:'2-digit'});
  renderList();
  document.getElementById('overlay').classList.remove('show');
}

// ── SIGNAL ──
function getSignal(p){
  const{price,ma5,ma10,ma20}=p;
  if(!price||!ma5||!ma10||!ma20) return{pill:'pill-idle',pillTxt:'⏳ 待數據',banner:null};
  const above=price>ma5&&ma5>ma10&&ma10>ma20;
  const below=price<ma5&&ma5<ma10&&ma10<ma20;
  if(above) return{pill:'pill-bull',pillTxt:'🔥 多頭排列',banner:{title:'🔥 多頭排列 — 牛市亢奮期',body:'股價 > MA5 > MA10 > MA20，三線向上打開。\n短線強勢，追高風險極高。',action:'✋ 不追高 · 靜待止盈收割',c:'var(--green)',bg:'#0a2010',abg:'#1a4a25'}};
  if(below) return{pill:'pill-bear',pillTxt:'🧊 空頭排列',banner:{title:'🧊 空頭排列 — 恐慌洗盤期',body:'股價 < MA5 < MA10 < MA20，三線垂頭向下。\n空頭宣洩期，勿盲目加倉。',action:'😴 裝死模式 · 等底部訊號',c:'var(--red)',bg:'#200a0a',abg:'#3a1010'}};
  if(price<ma20) return{pill:'pill-warn',pillTxt:'⚠️ 跌穿MA20',banner:{title:'⚠️ 收盤跌穿 MA20（紫線）',body:'紫線已由支撐變天花板。洗盤期通常 15–30 天。',action:'🚫 禁止加倉 · 裝死等待重收 MA20',c:'var(--yellow)',bg:'#1a1200',abg:'#3a2a00'}};
  if(price>ma20) return{pill:'pill-bull',pillTxt:'📈 MA20上方',banner:{title:'📈 MA20 上方整固',body:'股價企於紫線（MA20）上方，牛市地基穩固。',action:'👀 等重新站回 MA5 確認',c:'var(--blue)',bg:'#0a1020',abg:'#0f1e3a'}};
  return{pill:'pill-idle',pillTxt:'〰️ 觀望',banner:null};
}

// ── REBALANCE ──
function calcRebal(p,totalAssets){
  if(!p.price||!totalAssets||!p.weight) return null;
  const targetValue=totalAssets*(p.weight/100);
  const currentValue=p.price*(p.shares||0);
  const targetShares=Math.floor(targetValue/p.price);
  const diff=targetShares-(p.shares||0);
  return{targetValue,currentValue,targetShares,diff,diffValue:diff*p.price,currentPct:totalAssets>0?(currentValue/totalAssets*100):0};
}

// ── RENDER LIST ──
function renderList(){
  let totalMV=0,totalCost=0,hasMV=false;
  positions.forEach(p=>{
    if(p.price&&p.shares){totalMV+=p.price*p.shares;hasMV=true;}
    totalCost+=p.cost*(p.shares||0);
  });
  const totalAssets=cashTotal+totalMV;
  document.getElementById('mv-total').textContent=hasMV?'$'+totalMV.toFixed(0):'--';
  document.getElementById('asset-total').textContent=totalAssets?'$'+totalAssets.toFixed(0):'--';
  document.getElementById('cash-display').textContent=cashTotal?'$'+cashTotal.toFixed(0):'$0';
  const pnl=hasMV?totalMV-totalCost:null,pp=pnl&&totalCost?(pnl/totalCost*100):null;
  document.getElementById('s-mv').textContent=hasMV?'$'+totalMV.toFixed(0):'--';
  const sp=document.getElementById('s-pnl');
  if(pnl!=null){sp.textContent=(pnl>=0?'+':'')+pnl.toFixed(0);sp.className='sum-val '+(pnl>=0?'c-green':'c-red');}
  else{sp.textContent='--';sp.className='sum-val c-muted';}

  const el=document.getElementById('pos-list');
  if(!positions.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px">暫無持倉<br>點右下角＋新增</div>';return;}

  el.innerHTML=positions.map(p=>{
    const price=p.price,shares=p.shares||0,cost=p.cost;
    const mv=price&&shares?price*shares:null;
    const pnl=mv&&cost?(mv-cost*shares):null;
    const pnlPct=pnl&&cost*shares?(pnl/(cost*shares)*100):null;
    const sig=getSignal(p);
    const rb=calcRebal(p,totalAssets);
    const pc=price&&cost?(price>=cost?'c-green':'c-red'):'';

    function maChip(val,label,cls){
      if(!val) return`<div class="ma-chip"><div class="ma-chip-lbl ${cls}">${label}</div><div class="ma-chip-val c-muted">--</div></div>`;
      const d=price?((price-val)/val*100):null;
      return`<div class="ma-chip"><div class="ma-chip-lbl ${cls}">${label}</div><div class="ma-chip-val">$${val}</div><div class="ma-chip-d ${d!=null?(d>=0?'c-green':'c-red'):''}">${d!=null?(d>=0?'+':'')+d.toFixed(1)+'%':''}</div></div>`;
    }

    let actHtml='';
    if(rb){
      if(Math.abs(rb.diff)>=1){
        const isBuy=rb.diff>0;
        actHtml=`<span class="act-badge ${isBuy?'act-buy':'act-sell'}">${isBuy?'🛒 買入':'💰 沽出'} ${Math.abs(rb.diff)}股 (${isBuy?'+':'-'}$${Math.abs(rb.diffValue).toFixed(0)})</span>`;
      } else {
        actHtml=`<span class="act-badge act-hold">✅ 權重平衡</span>`;
      }
    } else if(!cashTotal){
      actHtml=`<span class="act-badge act-cash">💵 輸入總現金以計算再平衡</span>`;
    }

    return`<div class="pos-card">
      <div class="pos-header" onclick="showDetail('${p.ticker}')">
        <div class="pos-left">
          <div class="pos-ticker">${p.ticker}${!shares?'<span style="font-size:0.6rem;color:var(--muted);font-weight:400">空倉</span>':''}
            <span class="sig-pill ${sig.pill}">${sig.pillTxt}</span>
          </div>
          <div class="pos-name">${p.name}</div>
          <div class="pos-wt">${p.weight?`目標 ${p.weight}% · 現 ${rb?rb.currentPct.toFixed(1)+'%':'--'}`:''}</div>
        </div>
        <div class="pos-right">
          <div class="pos-price ${pc}">${price?'$'+price.toFixed(2):'--'}</div>
          <div class="pos-price-sub">${shares}股 · 成本$${cost?cost.toFixed(2):'--'}</div>
          <div class="pos-price-sub ${pnl==null?'':pnl>=0?'c-green':'c-red'}">${pnlPct!=null?(pnlPct>=0?'+':'')+pnlPct.toFixed(1)+'%':'--'}</div>
        </div>
      </div>
      ${actHtml?`<div class="pos-action" onclick="showDetail('${p.ticker}')">${actHtml}</div>`:''}
      <div class="ma-strip">
        ${maChip(p.ma5,'MA5 藍','ma5c')}
        ${maChip(p.ma10,'MA10 黃','ma10c')}
        ${maChip(p.ma20,'MA20 紫','ma20c')}
      </div>
      ${rb?`<div class="rebal-row">
        <div class="rb-cell"><div class="rb-lbl">目標股數</div><div class="rb-val">${rb.targetShares}股</div><div class="rb-sub">$${rb.targetValue.toFixed(0)}</div></div>
        <div class="rb-cell"><div class="rb-lbl">現持股數</div><div class="rb-val">${shares}股</div><div class="rb-sub">${mv?'$'+mv.toFixed(0):'--'}</div></div>
        <div class="rb-cell"><div class="rb-lbl">差額</div><div class="rb-val ${rb.diff>0?'c-green':rb.diff<0?'c-red':'c-muted'}">${rb.diff>0?'+':''}${rb.diff}股</div><div class="rb-sub ${rb.diff>0?'c-green':rb.diff<0?'c-red':'c-muted'}">${rb.diff>=0?'+':''}$${rb.diffValue.toFixed(0)}</div></div>
      </div>`:''}
    </div>`;
  }).join('');
}

// ── DETAIL ──
function buildDetail(p){
  const{price,ma5,ma10,ma20,shares,cost,tpPct,dipPct,slPct,note,weight,priceDate}=p;
  const mv=price&&shares?price*shares:null;
  const tc=cost*(shares||0);
  const pnl=mv&&tc?mv-tc:null;
  const pnlPct=pnl&&tc?(pnl/tc*100):null;
  const tpPrice=tpPct&&cost?+(cost*(1+tpPct/100)).toFixed(2):null;
  const dipPrice=dipPct&&cost?+(cost*(1-dipPct/100)).toFixed(2):null;
  const slPrice=slPct&&cost?+(cost*(1-slPct/100)).toFixed(2):null;
  const sig=getSignal(p);
  let h='';

  if(sig.banner){const b=sig.banner;h+=`<div class="sig-banner" style="background:${b.bg};border-color:${b.c}"><div class="sig-title" style="color:${b.c}">${b.title}</div><div class="sig-body">${b.body}</div><span class="sig-action" style="background:${b.abg};color:${b.c}">${b.action}</span></div>`;}

  function diff(ma){if(!price||!ma)return'';const d=((price-ma)/ma*100);return`<div class="ma-box-diff ${d>=0?'c-green':'c-red'}">${d>=0?'+':''}${d.toFixed(1)}%</div>`;}
  h+=`<div class="ma-row">
    <div class="ma-box"><div class="ma-box-lbl ma5c">▬ MA5 藍線</div><div class="ma-box-val">${ma5?'$'+ma5:'--'}</div>${diff(ma5)}</div>
    <div class="ma-box"><div class="ma-box-lbl ma10c">▬ MA10 黃線</div><div class="ma-box-val">${ma10?'$'+ma10:'--'}</div>${diff(ma10)}</div>
    <div class="ma-box"><div class="ma-box-lbl ma20c">▬ MA20 紫線</div><div class="ma-box-val">${ma20?'$'+ma20:'--'}</div>${diff(ma20)}</div>
  </div>`;

  if(price&&ma5&&ma10&&ma20){
    const items=[{v:price,l:'現價',cls:'ai-price'},{v:ma5,l:'MA5',cls:'ai-ma5'},{v:ma10,l:'MA10',cls:'ai-ma10'},{v:ma20,l:'MA20',cls:'ai-ma20'}].sort((a,b)=>b.v-a.v);
    h+=`<div class="arrange-box"><div class="arrange-lbl">📊 當前排列（高→低）</div><div class="ai-row">${items.map((x,i)=>`<span class="ai ${x.cls}">${x.l} $${x.v}</span>${i<3?'<span class="ai-sep">›</span>':''}`).join('')}</div></div>`;
  }

  h+=`<div class="g2">
    <div class="met"><div class="met-lbl">收盤價</div><div class="met-val ${price&&cost?(price>=cost?'c-green':'c-red'):''}">${price?'$'+price.toFixed(2):'--'}</div><div class="met-sub">${priceDate||'成本 $'+(cost?cost.toFixed(3):'--')}</div></div>
    <div class="met"><div class="met-lbl">持倉損益</div><div class="met-val ${pnl==null?'':pnl>=0?'c-green':'c-red'}">${pnlPct!=null?(pnlPct>=0?'+':'')+pnlPct.toFixed(2)+'%':'--'}</div><div class="met-sub">${pnl!=null?(pnl>=0?'+':'')+'$'+Math.abs(pnl).toFixed(0):'--'}</div></div>
    <div class="met"><div class="met-lbl">目標權重</div><div class="met-val c-blue">${weight?weight+'%':'--'}</div><div class="met-sub">市值 ${mv?'$'+mv.toFixed(0):'--'}</div></div>
    <div class="met"><div class="met-lbl">距止盈</div><div class="met-val ${tpPrice&&price?(price>=tpPrice?'c-green':'c-yellow'):''}">${tpPrice&&price?((tpPrice-price)/price*100>=0?'+':'')+((tpPrice-price)/price*100).toFixed(1)+'%':'長線不賣'}</div><div class="met-sub">${tpPrice?'目標 $'+tpPrice:'--'}</div></div>
  </div>`;

  h+=`<div class="tpsl-box"><div class="tpsl-lbl">🎯 關鍵價位</div>`;
  if(tpPrice){
    const rng=tpPrice-cost,prog=Math.min(100,Math.max(0,price?(price-cost)/rng*100:0));
    const fc=prog>=100?'var(--green)':prog>=50?'var(--yellow)':'var(--blue)';
    h+=`<div class="prog-track"><div class="prog-fill" style="width:${prog.toFixed(0)}%;background:${fc}"></div></div><div class="prog-labels"><span>成本 $${cost.toFixed(2)}</span><span>${prog.toFixed(0)}%</span><span>+${tpPct}% $${tpPrice}</span></div>`;
    h+=`<div class="tpsl-r"><span class="tpsl-k">🎯 止盈 TARGET</span><span class="tpsl-v c-green">$${tpPrice}<span class="tpsl-pct">+${tpPct}%</span></span></div>`;
  } else {h+=`<div class="tpsl-r"><span class="tpsl-k">🎯 止盈</span><span class="tpsl-v c-muted">長線不賣</span></div>`;}
  if(dipPrice){
    const dtd=price?((price-dipPrice)/price*100):null;
    h+=`<div class="tpsl-r"><span class="tpsl-k">🛒 加倉 BUY DIP</span><span class="tpsl-v c-yellow">$${dipPrice}<span class="tpsl-pct">-${dipPct}%</span></span></div>`;
    if(dtd!=null) h+=`<div class="tpsl-r"><span class="tpsl-k" style="color:var(--muted);font-size:0.68rem">　距加倉位</span><span class="tpsl-v ${dtd>=0?'c-muted':'c-yellow'}">${dtd>=0?'+':''}${dtd.toFixed(1)}%</span></div>`;
  } else {h+=`<div class="tpsl-r"><span class="tpsl-k">🛒 加倉</span><span class="tpsl-v c-muted">不設加倉</span></div>`;}
  if(slPrice) h+=`<div class="tpsl-r"><span class="tpsl-k">🛡 止蝕</span><span class="tpsl-v c-red">$${slPrice}<span class="tpsl-pct">-${slPct}%</span></span></div>`;
  else h+=`<div class="tpsl-r"><span class="tpsl-k">🛡 止蝕</span><span class="tpsl-v c-muted">裝死不割</span></div>`;
  h+=`</div>`;

  if(note) h+=`<div class="note-box"><div class="note-lbl">📝 個人戰略備忘</div><div class="note-txt">${note}</div></div>`;
  h+=`<div class="disclaimer">⚠️ 收盤價及 MA 來自 Alpha Vantage（前收盤日）。僅供參考。</div>`;
  document.getElementById('d-body').innerHTML=h;
  document.getElementById('d-body').scrollTop=0;
}

// ── MODAL ──
function openAddModal(){editingTicker=null;document.getElementById('modal-title').textContent='新增持倉';['ticker','name','shares','cost','weight','tp','dip','sl','note'].forEach(f=>{const el=document.getElementById('f-'+f);if(el)el.value='';});document.getElementById('mbtn-del').style.display='none';document.getElementById('modal').classList.add('show');}
function openEditModal(ticker){
  const p=positions.find(x=>x.ticker===ticker);if(!p)return;
  editingTicker=ticker;
  document.getElementById('modal-title').textContent='編輯 — '+ticker;
  document.getElementById('f-ticker').value=p.ticker;
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-shares').value=p.shares||0;
  document.getElementById('f-cost').value=p.cost||0;
  document.getElementById('f-weight').value=p.weight||'';
  document.getElementById('f-tp').value=p.tpPct||'';
  document.getElementById('f-dip').value=p.dipPct||'';
  document.getElementById('f-sl').value=p.slPct||'';
  document.getElementById('f-note').value=p.note||'';
  document.getElementById('mbtn-del').style.display='';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function savePosModal(){
  const ticker=(document.getElementById('f-ticker').value||'').toUpperCase().trim();
  const name=document.getElementById('f-name').value.trim();
  if(!ticker||!name){alert('請填寫代號和名稱');return;}
  const shares=parseFloat(document.getElementById('f-shares').value)||0;
  const cost=parseFloat(document.getElementById('f-cost').value)||0;
  const weight=parseFloat(document.getElementById('f-weight').value)||null;
  const tpPct=parseFloat(document.getElementById('f-tp').value)||null;
  const dipPct=parseFloat(document.getElementById('f-dip').value)||null;
  const slPct=parseFloat(document.getElementById('f-sl').value)||null;
  const note=document.getElementById('f-note').value.trim();
  if(editingTicker){const p=positions.find(x=>x.ticker===editingTicker);Object.assign(p,{ticker,name,shares,cost,weight,tpPct,dipPct,slPct,note});}
  else positions.push({ticker,name,shares,cost,weight,tpPct,dipPct,slPct,note,price:null,ma5:null,ma10:null,ma20:null,priceDate:null});
  persist();closeModal();renderList();
}
function deletePosModal(){
  if(!confirm('確認刪除？'))return;
  positions=positions.filter(x=>x.ticker!==editingTicker);
  persist();closeModal();showList();
}

// INIT
loadStorage();
renderList();
</script>
